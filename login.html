<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CodeLearn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">CodeLearn</div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="courses.html">Курсы</a>
                <a href="about.html">О нас</a>
                <a href="community.html">Сообщество</a>
                <a href="login.html" class="btn-login">Войти</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 20px; max-width: 450px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 30px;">Вход в аккаунт</h1>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Войти</button>
            <div id="loginMessage" class="message"></div>
        </form>
        <p style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
            Нет аккаунта? <a href="#" style="color: var(--primary);">Зарегистрироваться</a>
        </p>
    </main>

    <footer class="footer">
        <div class="container">
            © 2026 CodeLearn. Практическая работа 3. Панов А.С.
        </div>
    </footer>

    <!-- Подключение JS -->
    <script src="script.js"></script>
</body>
</html>
